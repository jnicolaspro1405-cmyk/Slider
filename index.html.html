<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Slider</title>

<style>
body {
  margin: 0;
  background: white;
}

.slider {
  position: relative;
  width: 100%;
  max-width: 100%;
  overflow: hidden;
}

.slide {
  display: none;
  width: 100%;
}

.slide.active {
  display: block;
}
@media (max-width: 900px) { 
img { 
   max-width: 100%;
   height: auto;
}

.table-container {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
}

table {
    width: 100%;
    border-collapse: collapse;
}

td, th {
    padding: 8px;
    text-align: left;
    border: 1px solid #ddd;
}
}	


</style>
</head>

<body>

<div class="slider">
  <img class="slide" src="https://drive.google.com/uc?export=view&id=1FEQtPGJ7VPbEawpQ5oqBysDMvTe3DXTC">
  <img class="slide" src="https://drive.google.com/uc?export=view&id=1B26ji98uSw1ECrzfWX77jF9zY7TC8w-W">
  <img class="slide" src="https://drive.google.com/uc?export=view&id=1iDLumebclwJenM_uwt2kBapX0kZZKxm3">
  <img class="slide" src="https://drive.google.com/uc?export=view&id=1YXhxhWWVWFlop_kfXsyCwSO0XeQl82HJ">
  <img class="slide" src="https://drive.google.com/uc?export=view&id=1hbfN3Znx3d7fW8dsXK3uTASuVr7iE7lH">
</div>

<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

function showSlide(i) {
  slides.forEach(slide => slide.classList.remove("active"));
  slides[i].classList.add("active");
}

function nextSlide() {
  index = (index + 1) % slides.length;
  showSlide(index);
}

showSlide(index);
setInterval(nextSlide, 4000);
</script>
