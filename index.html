<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slider</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  height:100vh;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

.slider{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
}

.slides{
  display:flex;
  height:100%;
  transition:transform 1s ease-in-out;
}

.slide{
  min-width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.slide img{
  width:90vmin;
  height:90vmin;
  object-fit:contain;
}

/* Flechas minimalistas */
.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  color:white;
  font-size:50px;
  cursor:pointer;
  transition:0.3s;
}

.arrow:hover{
  opacity:0.4;
}

.left{ left:30px; }
.right{ right:30px; }

/* Ocultamos puntos */
.dots{
  display:none;
}
</style>
</head>

<body>

<div class="slider">

  <div class="slides">
    <div class="slide"><img src="ILUbol2.png" alt=""></div>
    <div class="slide"><img src="ILUbol3.png" alt=""></div>
    <div class="slide"><img src="ILUbol4.png" alt=""></div>
    <div class="slide"><img src="ILUbol5.png" alt=""></div>
    <div class="slide"><img src="ILUbol6.png" alt=""></div>
  </div>

  <button class="arrow left">&#10094;</button>
  <button class="arrow right">&#10095;</button>

</div>

<script>
const slides = document.querySelector('.slides');
const slide = document.querySelectorAll('.slide');
const left = document.querySelector('.left');
const right = document.querySelector('.right');

let index = 0;
let interval;

function moveToSlide(i){
  index = i;
  slides.style.transform = `translateX(-${index * 100}%)`;
}

function nextSlide(){
  index = (index + 1) % slide.length;
  moveToSlide(index);
}

function prevSlide(){
  index = (index - 1 + slide.length) % slide.length;
  moveToSlide(index);
}

right.addEventListener('click', nextSlide);
left.addEventListener('click', prevSlide);

/* Auto slide cada 8 segundos */
function startAuto(){
  interval = setInterval(nextSlide, 8000);
}

function stopAuto(){
  clearInterval(interval);
}

startAuto();

/* Pausa cuando el mouse está encima */
document.querySelector('.slider').addEventListener('mouseover', stopAuto);
document.querySelector('.slider').addEventListener('mouseout', startAuto);

</script>

</body>
</html>
