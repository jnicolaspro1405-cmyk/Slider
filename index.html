<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Slider</title>

<style>
body {
  margin: 0;
  background: white;
}

.slider {
  position: relative;
  width: 100%;
  overflow: hidden;
}

.slide {
  display: none;
  width: 100%;
}

.slide.active {
  display: block;
}

/* Flechas */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.4);
  color: white;
  border: none;
  font-size: 24px;
  padding: 10px 15px;
  cursor: pointer;
}

.arrow.left {
  left: 10px;
}

.arrow.right {
  right: 10px;
}

.arrow:hover {
  background: rgba(0,0,0,0.7);
}
</style>
</head>

<body>

<div class="slider">
  <img class="slide" src="ILUbol2.png">
  <img class="slide" src="ILUbol3.png">
  <img class="slide" src="ILUbol4.png">
  <img class="slide" src="ILUbol5.png">
  <img class="slide" src="ILUbol6.png">

  <button class="arrow left" onclick="prevSlide()">&#10094;</button>
  <button class="arrow right" onclick="nextSlide()">&#10095;</button>
</div>

<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

function showSlide(i) {
  slides.forEach(slide => slide.classList.remove("active"));
  slides[i].classList.add("active");
}

function nextSlide() {
  index = (index + 1) % slides.length;
  showSlide(index);
}

function prevSlide() {
  index = (index - 1 + slides.length) % slides.length;
  showSlide(index);
}

showSlide(index);
setInterval(nextSlide, 4000);
</script>

</body>
</html>
